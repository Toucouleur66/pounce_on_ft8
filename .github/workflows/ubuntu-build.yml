name: Ubuntu Build (PyInstaller)

on:
  push:
    branches: [ handle_slave, main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system libraries for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-0 \
            libgl1 \
            libxkbcommon-x11-0 \
            libpulse0 \
            libasound2 \
            libfontconfig1 \
            libdbus-1-3 \
            libxcb1 \
            libx11-6 \
            libxext6 \
            libxrender1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python builder.py

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WaitAndPounce-linux
          path: |
            dist/**
            build/**
          if-no-files-found: warn

      # Optional: publish release when tagging
      - name: Publish GitHub Release (tagged builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WaitAndPounce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
